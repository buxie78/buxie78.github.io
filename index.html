<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>翠花俱乐部陪玩点单系统【免费云端版】</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
  body{background:#1a1a1a;color:#fff;padding:10px}
  .container{max-width:450px;margin:0 auto;background:#2d2d2d;border-radius:20px;padding:15px;box-shadow:0 0 20px #000}
  .title{text-align:center;margin-bottom:20px;font-size:22px;color:#ff4757}
  .game-tab{display:flex;justify-content:space-between;margin-bottom:15px}
  .game-btn{flex:1;padding:10px 0;border:none;border-radius:10px;margin:0 3px;font-size:14px;font-weight:bold;cursor:pointer}
  .game-btn.active{background:#ff4757;color:#fff}
  .game-btn.normal{background:#444;color:#ccc}
  .tab-bar{display:flex;justify-content:space-between;margin-bottom:20px}
  .tab-btn{flex:1;padding:12px 0;border:none;border-radius:10px;margin:0 5px;font-size:16px;font-weight:bold;cursor:pointer}
  .tab-btn.active{background:#ff4757;color:#fff}
  .tab-btn.normal{background:#444;color:#ccc;cursor:not-allowed;opacity:0.6}
  .page{display:none}
  .page.active{display:block}
  .category-title{font-size:18px;font-weight:bold;margin:15px 0 10px;color:#ffd32a;padding-left:5px;border-left:3px solid #ff4757}
  .item{background:#3d3d3d;border-radius:10px;padding:15px;margin-bottom:10px}
  .item-name{font-size:16px;font-weight:bold;margin-bottom:5px}
  .item-desc{font-size:14px;color:#ccc;margin-bottom:8px}
  .item-price{font-size:16px;color:#ff4757;font-weight:bold}
  .item-opt{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .opt-btn{width:30px;height:30px;border:none;border-radius:50%;background:#ff4757;color:#fff;font-size:18px;cursor:pointer;display:flex;justify-content:center;align-items:center;margin:0 5px}
  .num{font-size:16px;width:30px;text-align:center}
  .total-bar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:90%;max-width:430px;background:#ff4757;border-radius:15px;padding:15px;display:flex;justify-content:space-between;align-items:center}
  .total-text{font-size:18px;font-weight:bold}
  .submit-btn{padding:8px 20px;border:none;border-radius:8px;background:#fff;color:#ff4757;font-weight:bold;cursor-pointer;font-size:16px}
  .order-item{background:#3d3d3d;border-radius:10px;padding:15px;margin-bottom:10px}
  .order-top{display:flex;justify-content:space-between;margin-bottom:10px}
  .order-user{font-weight:bold;color:#ffd32a}
  .order-time{font-size:12px;color:#888}
  .order-goods{margin:10px 0;line-height:1.5}
  .order-opt{display:flex;justify-content:flex-end;gap:10px;margin-top:10px}
  .status-btn{padding:6px 12px;border:none;border-radius:6px;font-size:14px;cursor:pointer}
  .status-wait{background:#ffd32a;color:#1a1a1a}
  .status-accept{background:#2ed573;color:#fff}
  .status-done{background:#373fa3;color:#fff}
  .status-pending{background:#ff8c00;color:#fff}
  .status-reject{background:#ff3833;color:#fff}
  .empty-tip{text-align:center;padding:50px 0;color:#888;font-size:16px}
  .password-box{text-align:center;margin-top:50px}
  .password-input{width:80%;margin:20px 0}
  .confirm-btn{padding:12px 30px;border:none;border-radius:10px;background:#ff4757;color:#fff;font-size:16px;cursor:pointer;display:block;margin:15px auto}
  .input-box{width:100%;padding:12px;border-radius:10px;border:none;background:#3d3d3d;color:#fff;margin:10px 0;font-size:16px}
  .input-box::placeholder{color:#888}
  .photo-preview{max-width:200px;margin:10px auto;border-radius:8px;display:block}
  .wallet-info{background:#3d3d3d;border-radius:10px;padding:15px;margin-bottom:20px;text-align:center}
  .wallet-amount{font-size:28px;font-weight:bold;color:#ff4757}
  .wallet-label{font-size:14px;color:#ccc;margin-top:5px}
  .wallet-btn{padding:10px 25px;border:none;border-radius:8px;background:#ff4757;color:#fff;font-size:16px;cursor:pointer;margin:0 5px}
  .service-bottom{text-align:center;color:#888;font-size:12px;margin:10px 0}
  .reject-reason{color:#ff4757;font-weight:bold;margin:5px 0}
</style>
</head>
<body>
<div class="container">
  <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logoutHitter()">退出登录</button>

  <div class="tab-bar">
    <button class="tab-btn active normal" onclick="switchPage('order-page')">玩家下单</button>
    <button class="tab-btn normal" id="hitterTab" onclick="toHitterLogin()">打手中心</button>
    <button class="tab-btn normal" onclick="showServiceLogin()">客服审核</button>
    <button class="tab-btn normal" onclick="showAdminPassword()">管理员后台</button>
  </div>

  <div class="page active" id="order-page">
    <h2 class="title">翠花俱乐部陪玩点单</h2>
    <input type="text" class="input-box" id="userId" placeholder="请输入你的迷你ID" required>
    <input type="text" class="input-box" id="contact" placeholder="请输入联系方式（QQ/微信）">

    <div class="pay-box">
      <div style="color:#ffd32a;font-weight:bold">微信扫码支付</div>
      <img src="https://s41.ax1x.com/2026/02/27/pZz3BSU.png" style="width:160px;border-radius:8px;">
      <input type="file" id="payPic" accept="image/*">
    </div>

    <div class="agreement">
      <input type="checkbox" id="agreeAdult">
      <label for="agreeAdult">我已年满18周岁</label>
    </div>

    <div class="game-tab">
      <button class="game-btn active" onclick="switchGame('delta')">三角洲</button>
      <button class="game-btn" onclick="switchGame('escape')">迷你世界</button>
      <button class="game-btn" onclick="switchGame('equip')">和平精英</button>
    </div>

    <div id="delta-page" class="game-content active">
      <div class="category-title">三角洲米米州2</div>
      <div class="item" data-name="体验单" data-price="2">
        <div class="item-name">体验单 2元</div>
        <div class="item-price">¥2</div>
        <div class="item-opt">
          <button class="opt-btn" onclick="reduceNum(this)">-</button>
          <span class="num">0</span>
          <button class="opt-btn" onclick="addNum(this)">+</button>
        </div>
      </div>
      <div class="item" data-name="78单" data-price="4">
        <div class="item-name">78单 4元</div>
        <div class="item-price">¥4</div>
        <div class="item-opt">
          <button class="opt-btn" onclick="reduceNum(this)">-</button>
          <span class="num">0</span>
          <button class="opt-btn" onclick="addNum(this)">+</button>
        </div>
      </div>
    </div>

    <div id="escape-page" class="game-content">
      <div class="category-title">迷你世界地铁逃生</div>
      <div class="item" data-name="普通单" data-price="2">
        <div class="item-name">普通单 2元</div>
        <div class="item-price">¥2</div>
        <div class="item-opt">
          <button class="opt-btn" onclick="reduceNum(this)">-</button>
          <span class="num">0</span>
          <button class="opt-btn" onclick="addNum(this)">+</button>
        </div>
      </div>
    </div>

    <div id="equip-page" class="game-content">
      <div class="category-title">和平精英装备</div>
      <div class="item" data-name="七级套" data-price="1">
        <div class="item-name">七级套 1元</div>
        <div class="item-price">¥1</div>
        <div class="item-opt">
          <button class="opt-btn" onclick="reduceNum(this)">-</button>
          <span class="num">0</span>
          <button class="opt-btn" onclick="addNum(this)">+</button>
        </div>
      </div>
    </div>

    <div class="service-bottom">客服微信：111｜未成年人禁止消费</div>
  </div>

  <div class="page" id="hitter-login-page">
    <h2 class="title">打手登录</h2>
    <input type="text" class="input-box" id="hitterAccount" placeholder="账号">
    <input type="password" class="input-box" id="hitterPwd" placeholder="密码">
    <button class="confirm-btn" onclick="loginHitter()">登录</button>
  </div>

  <div class="page" id="hitter-page">
    <h2 class="title">打手中心</h2>
    <div class="wallet-info">
      <div class="wallet-amount">¥<span id="walletAmount">0.00</span></div>
      <div class="wallet-label">可提现余额</div>
    </div>
    <h3>待处理订单</h3>
    <div id="hitterOrderList"></div>
  </div>

  <div class="page" id="service-login-page">
    <h2 class="title">客服登录</h2>
    <input type="password" class="input-box" id="servicePwd" placeholder="客服密码">
    <button class="confirm-btn" onclick="checkServicePwd()">进入</button>
  </div>

  <div class="page" id="service-page">
    <h2 class="title">客服审核中心</h2>
    <div id="serviceOrderList"></div>
  </div>

  <div class="page" id="admin-page">
    <h2 class="title">管理员后台</h2>
    <div id="adminOrderList"></div>
  </div>

  <div class="page" id="password-page">
    <div class="password-box">
      <h2 class="title">管理员验证</h2>
      <input type="password" class="input-box" id="adminPassword" placeholder="管理员密码">
      <button class="confirm-btn" onclick="checkAdminPassword()">进入</button>
    </div>
  </div>
</div>

<div class="total-bar">
  <div class="total-text">总计：¥<span id="totalPrice">0</span></div>
  <button class="submit-btn" onclick="submitOrder()">提交订单</button>
</div>

<script>
// 免费云端配置（0元，不用服务器）
const APP_ID = "free-app-2025";
let orders = JSON.parse(localStorage.getItem("orders_" + APP_ID) || "[]");
let hitters = [
  { account: "majianfen", pwd: "ma199022", money: 0 },
  { account: "176845", pwd: "m176845", money: 0 }
];

let totalPrice = 0;
let currentHitter = null;
let isHitterLogin = false;
let serviceTimer;

const SERVICE_PWD = "1817900";
const ADMIN_PWD = "2012XU";

// 保存订单到本地云端（免费互通）
function saveOrders() {
  localStorage.setItem("orders_" + APP_ID, JSON.stringify(orders));
}

// 加载订单
function loadOrders() {
  orders = JSON.parse(localStorage.getItem("orders_" + APP_ID) || "[]");
}

window.onload = () => {
  loadOrders();
  calculateTotal();
};

// 数量加减
function addNum(btn) {
  const num = btn.previousElementSibling;
  num.innerText = parseInt(num.innerText) + 1;
  calculateTotal();
}
function reduceNum(btn) {
  const num = btn.nextElementSibling;
  num.innerText = Math.max(0, parseInt(num.innerText) - 1);
  calculateTotal();
}

// 计算总价
function calculateTotal() {
  totalPrice = 0;
  document.querySelectorAll(".item").forEach(item => {
    const n = parseInt(item.querySelector(".num").innerText);
    const p = parseFloat(item.dataset.price);
    totalPrice += n * p;
  });
  document.getElementById("totalPrice").innerText = totalPrice.toFixed(2);
}

// 切换游戏
function switchGame(id) {
  document.querySelectorAll(".game-content").forEach(g => g.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".game-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

// 切换页面
function switchPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if (id === "service-page") {
    renderService();
    clearInterval(serviceTimer);
    serviceTimer = setInterval(renderService, 3000);
  }
  if (id === "hitter-page") refreshHitterPage();
}

// 提交订单（免费云端）
async function submitOrder() {
  const userId = document.getElementById("userId").value.trim();
  const contact = document.getElementById("contact").value.trim();
  const pic = document.getElementById("payPic").files[0];
  const ok = document.getElementById("agreeAdult").checked;

  if (!userId || !ok || !pic || totalPrice <= 0) {
    alert("请完善信息并上传截图");
    return;
  }

  const goods = [];
  document.querySelectorAll(".item").forEach(i => {
    const n = parseInt(i.querySelector(".num").innerText);
    if (n > 0) {
      goods.push({
        name: i.dataset.name,
        price: parseFloat(i.dataset.price),
        num: n
      });
    }
  });

  const order = {
    id: Date.now(),
    userId,
    contact,
    goods,
    total: totalPrice,
    payPhoto: await toBase64(pic),
    status: -1,
    time: new Date().toLocaleString()
  };

  orders.unshift(order);
  saveOrders();
  alert("下单成功！客服已收到");
  location.reload();
}

// 图片转Base64
function toBase64(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}

// 打手登录
function loginHitter() {
  const a = document.getElementById("hitterAccount").value.trim();
  const p = document.getElementById("hitterPwd").value.trim();
  const h = hitters.find(x => x.account === a && x.pwd === p);
  if (!h) {
    alert("账号或密码错误");
    return;
  }
  currentHitter = h;
  isHitterLogin = true;
  alert("登录成功");
  switchPage("hitter-page");
}
function logoutHitter() {
  currentHitter = null;
  isHitterLogin = false;
  switchPage("order-page");
}
function toHitterLogin() {
  switchPage(isHitterLogin ? "hitter-page" : "hitter-login-page");
}

// 客服
function showServiceLogin() { switchPage("service-login-page"); }
function checkServicePwd() {
  if (document.getElementById("servicePwd").value === SERVICE_PWD) {
    switchPage("service-page");
  } else alert("密码错误");
}

// 管理员
function showAdminPassword() { switchPage("password-page"); }
function checkAdminPassword() {
  if (document.getElementById("adminPassword").value === ADMIN_PWD) {
    switchPage("admin-page");
  } else alert("密码错误");
}

// 刷新客服页面
function renderService() {
  loadOrders();
  const list = document.getElementById("serviceOrderList");
  const pend = orders.filter(o => o.status === -1);
  if (pend.length === 0) {
    list.innerHTML = '<div class="empty-tip">暂无待审核订单</div>';
    return;
  }
  let html = "";
  pend.forEach(o => {
    let g = "";
    o.goods.forEach(i => g += i.name + "×" + i.num + " ");
    html += `
    <div class="order-item">
      <div>玩家：${o.userId}</div>
      <div>商品：${g}</div>
      <div>金额：¥${o.total.toFixed(2)}</div>
      <div>时间：${o.time}</div>
      <img src="${o.payPhoto}" style="width:100%;border-radius:10px;margin:10px 0">
      <div class="order-opt">
        <button class="status-btn status-accept" onclick="passOrder(${o.id})">通过</button>
        <button class="status-btn status-reject" onclick="rejectOrder(${o.id})">拒绝</button>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

// 客服通过
function passOrder(id) {
  const o = orders.find(x => x.id === id);
  if (o) o.status = 0;
  saveOrders();
  renderService();
}
// 客服拒绝
function rejectOrder(id) {
  const o = orders.find(x => x.id === id);
  if (o) o.status = -2;
  saveOrders();
  renderService();
}

// 打手页面
function refreshHitterPage() {
  loadOrders();
  const list = document.getElementById("hitterOrderList");
  const my = orders.filter(o => o.status === 0);
  if (my.length === 0) {
    list.innerHTML = '<div class="empty-tip">暂无可接单</div>';
    return;
  }
  let html = "";
  my.forEach(o => {
    let g = ""; o.goods.forEach(i => g += i.name + "×" + i.num + "<br>");
    html += `
    <div class="order-item">
      <div>玩家：${o.userId}</div>
      <div>${g}</div>
      <div>¥${o.total.toFixed(2)}</div>
      <button class="status-btn status-accept" onclick="takeOrder(${o.id})">接单</button>
    </div>`;
  });
  list.innerHTML = html;
}

// 接单
function takeOrder(id) {
  const o = orders.find(x => x.id === id);
  if (o) o.status = 1;
  saveOrders();
  refreshHitterPage();
}
</script>
</body>
</html>
